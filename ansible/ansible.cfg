[defaults]
# Automatically discover python interpreter and suppress warnings
interpreter_python = auto_silent
# Basic settings
host_key_checking = False
inventory = inventory
remote_user = root
private_key_file = ~/.ssh/id_rsa
roles_path = roles

# Output settings
stdout_callback = default
bin_ansible_callbacks = True

[callback_default]
result_format = yaml

# Performance optimization
gathering = smart
fact_caching = memory
fact_caching_timeout = 3600

# SSH settings
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o ConnectTimeout=10 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
pipelining = True
timeout = 10

# Vault settings disabled for homelab convenience
# ask_vault_pass = True

[inventory]
enable_plugins = host_list, script, auto, yaml, ini, toml

[ssh_connection]
retries = 3