[defaults]
# Automatically discover python interpreter and suppress warnings
interpreter_python = auto_silent
# Basic settings
host_key_checking = False
inventory = inventory
remote_user = root
private_key_file = ~/.ssh/id_rsa
roles_path = roles
vault_password_file = .vault_pass

# Output settings
stdout_callback = debug
bin_ansible_callbacks = True

# Performance optimization
gathering = smart
fact_caching = memory
fact_caching_timeout = 3600

[callback_default]
result_format = yaml

[inventory]
enable_plugins = host_list, script, auto, yaml, ini, toml

[ssh_connection]
retries = 3
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o ConnectTimeout=10 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
pipelining = True
timeout = 10