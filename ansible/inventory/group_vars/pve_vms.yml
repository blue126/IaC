# Common variables for Proxmox VMs (Immich, Samba, Netbox)
# These settings are shared across VMs and can be overridden in host_vars if needed.

# Ansible connection settings
ansible_user: ubuntu
ansible_ssh_pass: "{{ vault_vm_default_password }}"
ansible_become_password: "{{ vault_vm_default_password }}"

# cloud-init configuration
vm_ciuser: ubuntu
vm_cipassword: "{{ vault_vm_default_password }}"
vm_ssh_pwauth: true

# VM template and storage defaults
vm_template_id: 9000
vm_storage_pool: vmdata

# Default network configuration
vm_gateway: 192.168.1.1
vm_dns_servers:
  - 192.168.1.1
vm_netmask: 24
