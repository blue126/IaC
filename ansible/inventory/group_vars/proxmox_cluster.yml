# Proxmox cluster configuration variables
# Storage and network settings (default values)
# Individual node storage will be defined in host_vars/
# Set to the bridge interface that VMs should attach to on each Proxmox node.
proxmox_bridge: vmbr1  # High-speed NIC bridge
# Choose the node that will host template creation and cloning operations.
proxmox_node_primary: pve0
# Cloud-init snippet used to enable password authentication for clones
cloudinit_snippet_filename: ubuntu-password.yml
cloudinit_snippet_storage: "local:snippets/{{ cloudinit_snippet_filename }}"

# VM template configuration
# Adjust these fields to match the desired template name, ID, and hardware profile.
vm_template_name: ubuntu-24.04-template
vm_template_id: 9000
vm_template_memory: 8192
vm_template_cores: 2
vm_template_disk_size: 20G

# Ubuntu cloud-init image settings
# Update these values if you need to source a different Ubuntu cloud image.
ubuntu_cloud_image_url: "https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img"
ubuntu_cloud_image_file: "noble-server-cloudimg-amd64.img"