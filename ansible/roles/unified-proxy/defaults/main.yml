---
# Source code repository
repo_url: ""       # Required: override in host_vars
repo_version: "main"
repo_clone_dir: "/tmp/unified-proxy-deploy"

# Install path
proxy_install_dir: /opt/unified-proxy

# Runtime binding (Caddy handles TLS; bind to loopback only)
proxy_host: "127.0.0.1"
proxy_port: 3456

# Public domain (DNS must resolve to OCI VM public IP)
proxy_domain: ""   # Required: override in host_vars

# Node.js major version
nodejs_major: 20
