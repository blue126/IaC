---
# ── 1. System packages ─────────────────────────────────────────────────

- name: Install prerequisite packages
  apt:
    name:
      - curl
      - ca-certificates
      - gnupg
      - git
      - debian-keyring
      - debian-archive-keyring
      - apt-transport-https
      - python3
      - netfilter-persistent
      - iptables-persistent
    state: present
    update_cache: true

# ── 2. Node.js repository ──────────────────────────────────────────────

- name: Add NodeSource GPG key
  shell: |
    curl -fsSL https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key \
      | gpg --dearmor -o /usr/share/keyrings/nodesource.gpg
  args:
    creates: /usr/share/keyrings/nodesource.gpg

- name: Add NodeSource apt repository
  deb822_repository:
    name: nodesource
    types: deb
    uris: "https://deb.nodesource.com/node_{{ nodejs_major }}.x"
    suites: nodistro
    components: main
    signed_by: /usr/share/keyrings/nodesource.gpg
    state: present
  register: nodesource_repo

# ── 3. Caddy repository ────────────────────────────────────────────────

- name: Add Caddy GPG key
  shell: |
    curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/gpg.key' \
      | gpg --dearmor -o /usr/share/keyrings/caddy-stable-archive-keyring.gpg
  args:
    creates: /usr/share/keyrings/caddy-stable-archive-keyring.gpg

- name: Add Caddy apt repository
  deb822_repository:
    name: caddy-stable
    types: deb
    uris: https://dl.cloudsmith.io/public/caddy/stable/deb/debian
    suites: any-version
    components: main
    signed_by: /usr/share/keyrings/caddy-stable-archive-keyring.gpg
    state: present
  register: caddy_repo

- name: Update apt cache after adding repositories
  apt:
    update_cache: true
  when: nodesource_repo.changed or caddy_repo.changed

- name: Install Node.js {{ nodejs_major }}
  apt:
    name: nodejs
    state: present

- name: Install Caddy
  apt:
    name: caddy
    state: present

# ── 4. Firewall ────────────────────────────────────────────────────────

- name: Allow HTTP (80) through iptables
  iptables:
    chain: INPUT
    protocol: tcp
    destination_port: "80"
    jump: ACCEPT
    state: present

- name: Allow HTTPS (443) through iptables
  iptables:
    chain: INPUT
    protocol: tcp
    destination_port: "443"
    jump: ACCEPT
    state: present

- name: Persist iptables rules
  command: netfilter-persistent save
  changed_when: false

# ── 5. Application code ────────────────────────────────────────────────

- name: Create install directory
  file:
    path: "{{ proxy_install_dir }}"
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: "0755"

- name: Clone / update unified-proxy repository
  git:
    repo: "{{ repo_url }}"
    dest: "{{ repo_clone_dir }}"
    version: "{{ repo_version }}"
    depth: 1
    force: true
  become_user: ubuntu
  tags: [code]

- name: Copy server.js from repo
  copy:
    src: "{{ repo_clone_dir }}/server.js"
    dest: "{{ proxy_install_dir }}/server.js"
    remote_src: true
    owner: ubuntu
    group: ubuntu
    mode: "0644"
  notify: Restart unified-proxy
  tags: [code]

- name: Copy package.json from repo
  copy:
    src: "{{ repo_clone_dir }}/package.json"
    dest: "{{ proxy_install_dir }}/package.json"
    remote_src: true
    owner: ubuntu
    group: ubuntu
    mode: "0644"
  tags: [code]

- name: Clean up temporary clone directory
  file:
    path: "{{ repo_clone_dir }}"
    state: absent
  tags: [code]

# ── 6. Sensitive data (from vault) ────────────────────────────────────

- name: Deploy auth.json from vault
  copy:
    content: "{{ vault_auth_json }}"
    dest: "{{ proxy_install_dir }}/auth.json"
    owner: ubuntu
    group: ubuntu
    mode: "0600"
  no_log: true
  notify: Restart unified-proxy
  tags: [auth]

- name: Check if .env exists
  stat:
    path: "{{ proxy_install_dir }}/.env"
  register: env_file

- name: Deploy .env from template (first time only)
  template:
    src: env.j2
    dest: "{{ proxy_install_dir }}/.env"
    owner: ubuntu
    group: ubuntu
    mode: "0600"
  no_log: true
  when: not env_file.stat.exists
  notify: Restart unified-proxy
  tags: [config]

- name: Update .env non-secret values
  lineinfile:
    path: "{{ proxy_install_dir }}/.env"
    regexp: "^{{ item.key }}="
    line: "{{ item.key }}={{ item.value }}"
  loop:
    - { key: HOST, value: "{{ proxy_host }}" }
    - { key: PORT, value: "{{ proxy_port }}" }
    - { key: PROXY_AUTH_FILE, value: "{{ proxy_install_dir }}/auth.json" }
  notify: Restart unified-proxy
  tags: [config]

# ── 7. systemd service ─────────────────────────────────────────────────

- name: Deploy systemd service unit
  template:
    src: unified-proxy.service.j2
    dest: /etc/systemd/system/unified-proxy.service
    mode: "0644"
  notify:
    - Reload systemd
    - Restart unified-proxy

- name: Enable and start unified-proxy
  systemd:
    name: unified-proxy
    enabled: true
    state: started
    daemon_reload: true

# ── 8. Caddy configuration ─────────────────────────────────────────────

- name: Deploy Caddyfile
  template:
    src: Caddyfile.j2
    dest: /etc/caddy/Caddyfile
    mode: "0644"
  notify: Restart Caddy

- name: Enable and start Caddy
  systemd:
    name: caddy
    enabled: true
    state: started

# ── 9. Verification ────────────────────────────────────────────────────

- name: Wait for unified-proxy to be ready
  wait_for:
    host: "127.0.0.1"
    port: "{{ proxy_port }}"
    timeout: 15

- name: Health check
  uri:
    url: "http://127.0.0.1:{{ proxy_port }}/health"
    method: GET
    status_code: 200
    return_content: true
  register: health
  changed_when: false

- name: Print health check result
  debug:
    msg: "{{ health.json }}"
