---
# Compile ik_llama.cpp with CUDA support

- name: Ensure install directory exists
  ansible.builtin.file:
    path: "{{ llm_server_install_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Clone ik_llama.cpp repository
  ansible.builtin.git:
    repo: "{{ llm_server_engine_repo }}"
    dest: "{{ llm_server_install_dir }}/ik_llama.cpp"
    version: "{{ llm_server_engine_version | default(omit, true) }}"
    force: true
  register: llama_cpp_clone

- name: Get current HEAD commit
  ansible.builtin.command: git rev-parse HEAD
  args:
    chdir: "{{ llm_server_install_dir }}/ik_llama.cpp"
  register: llama_cpp_head
  changed_when: false

- name: Check build version marker
  ansible.builtin.command: cat {{ llm_server_install_dir }}/ik_llama.cpp/build/.ik-version
  register: build_version_content
  changed_when: false
  failed_when: false

- name: Remove stale build on version mismatch
  ansible.builtin.file:
    path: "{{ llm_server_install_dir }}/ik_llama.cpp/build"
    state: absent
  when: (build_version_content.stdout | default('')) != llama_cpp_head.stdout

- name: Build ik_llama.cpp with CUDA support
  ansible.builtin.shell: |
    set -e
    cmake -B build \
        -DCMAKE_BUILD_TYPE=Release \
        -DGGML_CUDA=ON \
        -DGGML_CUDA_F16=ON
    cmake --build build --config Release -j $(nproc)
    echo "{{ llama_cpp_head.stdout }}" > build/.ik-version
  args:
    chdir: "{{ llm_server_install_dir }}/ik_llama.cpp"
    creates: "{{ llm_server_install_dir }}/ik_llama.cpp/build/bin/llama-server"
  environment:
    PATH: "/usr/local/cuda/bin:{{ ansible_env.PATH }}"
  notify: Restart llama-server
