---
# Handlers for LLM Server role

- name: Reboot for NVIDIA driver
  ansible.builtin.reboot:
    reboot_timeout: 300
    msg: "Rebooting after NVIDIA driver installation"

- name: Restart llama-server
  ansible.builtin.systemd:
    name: llama-server
    state: restarted
    daemon_reload: true

- name: Restart Open WebUI
  ansible.builtin.command: docker compose up -d --force-recreate
  args:
    chdir: "{{ llm_server_webui_data_dir }}"
