---
- name: Update Device in Netbox
  netbox.netbox.netbox_device:
    netbox_url: "{{ netbox_url }}"
    netbox_token: "{{ netbox_token }}"
    data:
      name: "{{ netbox_name | default(inventory_hostname) }}"
      serial: "{{ ansible_product_serial | default(omit) }}"
      asset_tag: "{{ ansible_product_uuid | default(omit) }}"
    state: present
    validate_certs: no
  delegate_to: localhost
  ignore_errors: yes
  when: ansible_virtualization_role != 'guest'

- name: Update VM Resources (Memory/Disk)
  netbox.netbox.netbox_virtual_machine:
    netbox_url: "{{ netbox_url }}"
    netbox_token: "{{ netbox_token }}"
    data:
      name: "{{ netbox_name | default(inventory_hostname) }}"
      vcpus: "{{ ansible_processor_vcpus | default(omit) }}"
      memory: "{{ ansible_memtotal_mb | default(omit) }}"
      disk: "{{ ((ansible_mounts | selectattr('mount', 'equalto', '/') | map(attribute='size_total') | list + [0]) | first / 1024 / 1024) | int | default(omit) }}"
    state: present
    validate_certs: no
  delegate_to: localhost
  when: ansible_virtualization_role == 'guest'
