---
# Install and configure Homepage dashboard from source

- name: Install required packages
  ansible.builtin.apt:
    name:
      - git
      - curl
      - ca-certificates
      - gnupg
    state: present
    update_cache: yes

- name: Add NodeSource GPG key
  ansible.builtin.apt_key:
    url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
    state: present

- name: Add NodeSource repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64] https://deb.nodesource.com/node_{{ nodejs_version }}.x nodistro main"
    state: present
    filename: nodesource

- name: Install Node.js
  ansible.builtin.apt:
    name: nodejs
    state: present
    update_cache: yes

- name: Install pnpm globally
  ansible.builtin.command:
    cmd: npm install -g pnpm
  changed_when: false

- name: Check if Homepage repository exists
  ansible.builtin.stat:
    path: "{{ homepage_install_dir }}/.git"
  register: git_repo

- name: Clone Homepage repository
  ansible.builtin.shell:
    cmd: git clone https://github.com/gethomepage/homepage.git {{ homepage_install_dir }}
  when: not git_repo.stat.exists
  notify: 
    - Install Homepage dependencies
    - Build Homepage
    - Restart Homepage

- name: Update Homepage repository
  ansible.builtin.shell:
    cmd: cd {{ homepage_install_dir }} && git fetch origin && git checkout {{ homepage_version }} && git pull
  when: git_repo.stat.exists
  register: git_pull
  changed_when: "'Already up to date' not in git_pull.stdout"
  notify: 
    - Install Homepage dependencies
    - Build Homepage
    - Restart Homepage

# Dependencies and Build are now triggered by handlers only when code changes
# But we need to ensure they run at least once if not installed
- name: Check if node_modules exists
  ansible.builtin.stat:
    path: "{{ homepage_install_dir }}/node_modules"
  register: node_modules

- name: Initial Install Homepage dependencies
  ansible.builtin.command:
    cmd: pnpm install
    chdir: "{{ homepage_install_dir }}"
  when: not node_modules.stat.exists

- name: Check if build exists
  ansible.builtin.stat:
    path: "{{ homepage_install_dir }}/.next"
  register: next_build

- name: Initial Build Homepage
  ansible.builtin.command:
    cmd: pnpm build
    chdir: "{{ homepage_install_dir }}"
  when: not next_build.stat.exists

# Import configuration tasks
- name: Import configuration tasks
  ansible.builtin.import_tasks: config.yml
  tags: [config]

- name: Deploy Homepage systemd service
  ansible.builtin.template:
    src: homepage.service.j2
    dest: /etc/systemd/system/homepage.service
  notify: 
    - Reload systemd
    - Restart Homepage

- name: Enable and start Homepage service
  ansible.builtin.systemd:
    name: homepage
    enabled: yes
    state: started
    daemon_reload: yes

- name: Wait for Homepage to be ready
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ homepage_port }}"
    status_code: 200
  register: result
  until: result.status == 200
  retries: 30
  delay: 2

- name: Display Homepage access information
  ansible.builtin.debug:
    msg: "Homepage is accessible at http://{{ ansible_host }}:{{ homepage_port }}"
