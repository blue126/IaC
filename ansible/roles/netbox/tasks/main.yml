---
- name: Install git
  apt:
    name: git
    state: present
    update_cache: yes

- name: Check if Netbox directory is a git repo
  stat:
    path: "{{ netbox_install_dir }}/.git"
  register: netbox_git_dir

- name: Remove existing non-git directory
  file:
    path: "{{ netbox_install_dir }}"
    state: absent
  when: not netbox_git_dir.stat.exists

- name: Clone Netbox Docker repository
  git:
    repo: "{{ netbox_git_repo }}"
    dest: "{{ netbox_install_dir }}"
    version: "{{ netbox_git_version }}"
    force: yes

- name: Create docker-compose.override.yml
  copy:
    dest: "{{ netbox_install_dir }}/docker-compose.override.yml"
    content: |
      services:
        netbox:
          image: "{{ netbox_image }}"
          user: "unit:root"
          ports:
            - "{{ netbox_port }}:8080"
          environment:
            - SKIP_SUPERUSER=false
            - SUPERUSER_NAME={{ netbox_superuser_name }}
            - SUPERUSER_EMAIL={{ netbox_superuser_email }}
            - SUPERUSER_PASSWORD={{ netbox_superuser_password }}
            - SUPERUSER_API_TOKEN={{ netbox_superuser_api_token }}
        netbox-worker:
          image: "{{ netbox_image }}"
          user: "unit:root"
        netbox-housekeeping:
          image: "{{ netbox_image }}"
          user: "unit:root"

- name: Pull Netbox images
  command: docker compose pull
  args:
    chdir: "{{ netbox_install_dir }}"

- name: Start Netbox
  command: docker compose up -d
  args:
    chdir: "{{ netbox_install_dir }}"
  async: 600
  poll: 10

- name: Wait for Netbox to become healthy
  shell: docker compose ps | grep netbox | grep healthy
  args:
    chdir: "{{ netbox_install_dir }}"
  register: compose_status
  until: compose_status.rc == 0
  retries: 60
  delay: 10
  changed_when: false

