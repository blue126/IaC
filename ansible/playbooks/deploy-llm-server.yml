---
# Playbook to deploy LLM Server with ik_llama.cpp and Open WebUI.
# Provisioning is handled by Terraform (terraform/esxi/llm-server.tf).
#
# Prerequisites:
#   - Ubuntu 24.04 VM with GPU passthrough (2x RTX 3090)
#   - BIOS: VT-d and Above 4G Decoding enabled
#   - ESXi: GPU PCI passthrough toggled and host rebooted
#
# Usage:
#   ansible-playbook playbooks/deploy-llm-server.yml
#   ansible-playbook playbooks/deploy-llm-server.yml --tags verify
#   ansible-playbook playbooks/deploy-llm-server.yml --tags benchmark

- name: Deploy LLM Server
  hosts: llm-server
  become: true
  pre_tasks:
    - name: Set hostname
      ansible.builtin.hostname:
        name: "{{ inventory_hostname }}"
  roles:
    - common
    - docker
    - llm-server

- name: Verify LLM Server Deployment
  hosts: llm-server
  become: true
  tags: [verify]
  vars:
    _boot: "{{ llm_server_models[llm_server_boot_model] }}"
  tasks:
    # GPU verification
    - name: Check nvidia-smi
      ansible.builtin.command: nvidia-smi --query-gpu=name,memory.total --format=csv,noheader
      register: nvidia_smi_result
      changed_when: false

    - name: Count detected GPUs
      ansible.builtin.shell: |
        set -o pipefail
        nvidia-smi --query-gpu=name --format=csv,noheader | wc -l
      args:
        executable: /bin/bash
      register: gpu_count
      changed_when: false

    - name: Assert 2 GPUs detected
      ansible.builtin.assert:
        that:
          - gpu_count.stdout | int == 2
        fail_msg: "Expected 2 GPUs, found {{ gpu_count.stdout }}"
        success_msg: "2 GPUs detected: {{ nvidia_smi_result.stdout }}"
      when: not ansible_check_mode

    # llama-server service
    - name: Check llama-server service status
      ansible.builtin.systemd:
        name: "llama-server@{{ llm_server_boot_model }}"
      register: llama_server_status

    - name: Assert llama-server is running
      ansible.builtin.assert:
        that:
          - llama_server_status.status.ActiveState == "active"
          - llama_server_status.status.SubState == "running"
        fail_msg: "llama-server@{{ llm_server_boot_model }} is not running"
        success_msg: "llama-server@{{ llm_server_boot_model }} is active and running"
      when: not ansible_check_mode

    # llama-server health check
    - name: Wait for llama-server port
      ansible.builtin.wait_for:
        port: "{{ llm_server_port }}"
        timeout: 120
      when: not ansible_check_mode

    - name: Health check - GET /health
      ansible.builtin.uri:
        url: "http://localhost:{{ llm_server_port }}/health"
        method: GET
        status_code: [200]
        timeout: 30
      register: health_result
      until: health_result.status == 200
      retries: 20
      delay: 15
      when: not ansible_check_mode

    # Inference smoke test
    - name: Inference smoke test - POST /v1/chat/completions
      ansible.builtin.uri:
        url: "http://localhost:{{ llm_server_port }}/v1/chat/completions"
        method: POST
        body_format: json
        body:
          model: "{{ _boot.model_alias }}"
          messages:
            - role: "user"
              content: "Reply with exactly: Hello World"
          max_tokens: 256
        status_code: [200]
        timeout: 300
      register: inference_result
      when: not ansible_check_mode

    - name: Assert inference response is valid
      ansible.builtin.assert:
        that:
          - inference_result.json.choices | length > 0
          - >-
            (inference_result.json.choices[0].message.content | default('') | length > 0)
            or
            (inference_result.json.choices[0].message.reasoning_content | default('') | length > 0)
        fail_msg: "Inference returned empty response"
        success_msg: >-
          Inference smoke test passed
          ({{ (inference_result.json.usage | default({})).total_tokens | default('N/A') }} tokens,
          {{ (inference_result.json.timings | default({})).predicted_per_second | default('N/A') }} tok/s)
      when: not ansible_check_mode

    # MoE verification via .ot file and process command line
    - name: Check tensor override file exists
      ansible.builtin.stat:
        path: "{{ llm_server_install_dir }}/models/{{ llm_server_boot_model }}.ot"
      register: ot_file
      when: _boot.tensor_overrides | default([]) | length > 0

    - name: Get llama-server process command line
      ansible.builtin.shell: |
        set -o pipefail
        cat /proc/$(systemctl show "llama-server@{{ llm_server_boot_model }}" -p MainPID --value)/cmdline | tr '\0' ' '
      args:
        executable: /bin/bash
      register: llama_cmdline
      changed_when: false
      when:
        - not ansible_check_mode
        - _boot.tensor_overrides | default([]) | length > 0

    - name: Assert MoE offload is active
      ansible.builtin.assert:
        that:
          - ot_file.stat.exists
          - "'exps' in llama_cmdline.stdout"
        fail_msg: "MoE offload not active — .ot file missing or -ot flags not in process"
        success_msg: "MoE offload enabled ({{ _boot.tensor_overrides | length }} rules)"
      when:
        - not ansible_check_mode
        - _boot.tensor_overrides | default([]) | length > 0

    # Startup log verification
    - name: Fetch startup logs for current llama-server process
      ansible.builtin.shell: |
        set -o pipefail
        journalctl -u "llama-server@{{ llm_server_boot_model }}" _PID=$(systemctl show "llama-server@{{ llm_server_boot_model }}" -p MainPID --value) --no-pager
      args:
        executable: /bin/bash
      register: startup_log
      changed_when: false

    - name: Assert model loaded successfully
      ansible.builtin.assert:
        that:
          - "'model loaded' in startup_log.stdout"
        fail_msg: "Model load completion not found in startup logs"
        success_msg: "Model loaded successfully"
      when: not ansible_check_mode

    - name: Show buffer allocation from startup logs
      ansible.builtin.debug:
        msg: "{{ startup_log.stdout_lines | select('search', 'buffer size') | list }}"
      when: startup_log.stdout_lines | select('search', 'buffer size') | list | length > 0

    # PCIe link verification (note: VM passthrough shows virtual PCIe topology)
    - name: Check GPU PCIe link status via lspci
      ansible.builtin.shell: |
        set -o pipefail
        for dev in $(lspci | grep -i nvidia | awk '{print $1}'); do
          echo "=== GPU: $(lspci -s $dev | cut -d: -f3-) ==="
          lspci -vv -s "$dev" 2>/dev/null | grep -E "LnkCap:|LnkSta:" | head -2
        done
      args:
        executable: /bin/bash
      register: pcie_link_status
      changed_when: false

    - name: Display PCIe link info
      ansible.builtin.debug:
        msg: "{{ pcie_link_status.stdout_lines }}"

    # Open WebUI
    - name: Wait for Open WebUI port
      ansible.builtin.wait_for:
        port: "{{ llm_server_webui_port }}"
        timeout: 60
      when: not ansible_check_mode

    - name: Check Open WebUI HTTP
      ansible.builtin.uri:
        url: "http://localhost:{{ llm_server_webui_port }}"
        method: GET
        status_code: [200, 301, 302]
        timeout: 10
      register: webui_http_result
      when: not ansible_check_mode

    # VRAM range validation
    - name: Check GPU VRAM usage is in expected range
      ansible.builtin.shell: |
        set -o pipefail
        nvidia-smi --query-gpu=memory.used --format=csv,noheader,nounits
      args:
        executable: /bin/bash
      register: vram_used
      changed_when: false

    - name: Assert VRAM usage is reasonable (each GPU > 1GB, < 24GB)
      ansible.builtin.assert:
        that:
          - item | int > 1000
          - item | int < 24000
        fail_msg: "GPU VRAM {{ item }} MiB out of expected range (1-24 GB)"
        success_msg: "GPU VRAM {{ item }} MiB OK"
      loop: "{{ vram_used.stdout_lines }}"
      when: not ansible_check_mode

    # NUMA memory distribution
    - name: Check NUMA memory distribution
      ansible.builtin.shell: |
        set -o pipefail
        numastat -p $(pgrep llama-server) 2>/dev/null | tail -5
      args:
        executable: /bin/bash
      register: numa_info
      changed_when: false
      failed_when: false

    - name: Display NUMA info
      ansible.builtin.debug:
        msg: "{{ numa_info.stdout_lines }}"
      when: numa_info.stdout_lines | default([]) | length > 0

    # Deployment summary
    - name: Get GPU details
      ansible.builtin.command: nvidia-smi --query-gpu=name,memory.total,memory.used --format=csv,noheader
      register: gpu_details
      changed_when: false

    - name: Display deployment summary
      ansible.builtin.debug:
        msg:
          - "========================================="
          - "LLM Server Deployment Summary"
          - "========================================="
          - "GPUs: {{ gpu_count.stdout | trim }} detected"
          - "{{ gpu_details.stdout }}"
          - "Instance: llama-server@{{ llm_server_boot_model }}"
          - "Status: {{ 'Running' if llama_server_status.status.ActiveState == 'active' else 'Not running' }}"
          - "API: http://{{ ansible_host }}:{{ llm_server_port }}"
          - "Health: {{ 'OK' if health_result is success else 'Not ready' }}"
          - "Inference: {{ 'OK' if inference_result is success else 'Not tested' }}"
          - "Open WebUI: http://{{ ansible_host }}:{{ llm_server_webui_port }}"
          - "Models: {{ llm_server_models.keys() | list | join(', ') }}"
          - "========================================="
      when: not ansible_check_mode

- name: Benchmark LLM Server
  hosts: llm-server
  become: true
  tags: [benchmark]
  roles:
    - role: llm-benchmark
      vars:
        llm_benchmark_api_url: "http://localhost:{{ llm_server_port }}"
