---
# Playbook to create Ubuntu 24.04 VM template on Proxmox
- name: Create Ubuntu VM Template
  hosts: pve0  # Run on primary node only since other nodes are powered off
  gather_facts: false
  become: true

  tasks:
    - name: Check if cloud image already exists
      stat:
        path: "/var/lib/vz/images/{{ ubuntu_cloud_image_file }}"
      register: cloud_image_stat

    - name: Download Ubuntu 24.04 cloud image
      get_url:
        url: "{{ ubuntu_cloud_image_url }}"
        dest: "/var/lib/vz/images/{{ ubuntu_cloud_image_file }}"
        mode: '0644'
        timeout: 300
      when: not cloud_image_stat.stat.exists

    - name: Check if VM template already exists
      command: qm status {{ vm_template_id }}
      register: vm_exists
      failed_when: false
      changed_when: false

    - name: Create new VM for template
      command: >
        qm create {{ vm_template_id }}
        --name {{ vm_template_name }}
        --memory {{ vm_template_memory }}
        --cores {{ vm_template_cores }}
        --net0 virtio,bridge={{ proxmox_bridge }}
        --scsihw virtio-scsi-pci
        --scsi0 {{ proxmox_storage }}:0,import-from=/var/lib/vz/images/{{ ubuntu_cloud_image_file }}
        --ide2 {{ proxmox_storage }}:cloudinit
        --boot c --bootdisk scsi0
        --serial0 socket --vga serial0
        --agent enabled=1
      when: vm_exists.rc != 0

    - name: Resize disk to specified size
      command: qm resize {{ vm_template_id }} scsi0 {{ vm_template_disk_size }}
      when: vm_exists.rc != 0

    - name: Set cloud-init configuration
      command: >
        qm set {{ vm_template_id }}
        --ciuser ubuntu
        --cipassword ubuntu
        --sshkeys ~/.ssh/authorized_keys
        --ipconfig0 ip=dhcp
      when: vm_exists.rc != 0

    - name: Convert VM to template
      command: qm template {{ vm_template_id }}
      when: vm_exists.rc != 0

    - name: Ensure cloud-init snippets directory exists
      file:
        path: /var/lib/vz/snippets
        state: directory
        mode: '0755'

    - name: Ensure password-enabled cloud-init snippet is present
      copy:
        dest: "/var/lib/vz/snippets/{{ cloudinit_snippet_filename }}"
        mode: '0640'
        content: |
          #cloud-config
          ssh_pwauth: true
          users:
            - default
            - name: ubuntu
              sudo: ALL=(ALL) NOPASSWD:ALL
              groups: sudo
              lock_passwd: false
          chpasswd:
            list: |
              ubuntu:ubuntu
            expire: false

    - name: Template creation completed
      debug:
        msg: "Ubuntu 24.04 template '{{ vm_template_name }}' (ID: {{ vm_template_id }}) created successfully"