# Playbook to install Docker and deploy the Immich stack.
# Provisioning is now handled by Terraform.
#
# Expected variable inputs (inventory/pve_vms/immich.yml):
#   - immich_app_dir derivatives: compose root, uploads, database, .env path
#   - immich_version and DB credentials used when rendering the Immich .env file

- name: Deploy Immich Service
  hosts: immich
  become: true
  pre_tasks:
    - name: Set hostname
      ansible.builtin.hostname:
        name: "{{ inventory_hostname }}"
  roles:
    - docker
    - immich

- name: Verify Immich Deployment
  hosts: immich
  become: true
  tags: [verify]
  vars:
    immich_host_user: "{{ ansible_user | default('ubuntu') }}"
  tasks:
    # Wait for Immich web server port
    - name: Wait for Immich web server to be ready
      wait_for:
        port: 2283
        timeout: 60
      register: immich_port_result

    # Check Docker service status
    - name: Check Docker service status
      systemd:
        name: docker
      register: docker_status

    - name: Assert Docker service is running
      assert:
        that:
          - docker_status.status.ActiveState == "active"
          - docker_status.status.SubState == "running"
        fail_msg: "❌ Docker service is not running"
        success_msg: "✅ Docker service is active and running"
      when: not ansible_check_mode

    # Get Docker Compose services status
    - name: Get Immich containers status
      command: docker compose ps
      args:
        chdir: "{{ immich_app_dir }}"
      become_user: "{{ immich_host_user }}"
      register: compose_ps_result
      changed_when: false

    # Check for running containers
    - name: Count running containers
      shell: docker compose ps --status running | grep -c "Up" || true
      args:
        chdir: "{{ immich_app_dir }}"
      become_user: "{{ immich_host_user }}"
      register: running_count
      changed_when: false

    - name: Assert containers are running
      assert:
        that:
          - running_count.stdout | int > 0
        fail_msg: "❌ No Immich containers are running"
        success_msg: "✅ Immich containers are running ({{ running_count.stdout }} found)"
      when: not ansible_check_mode

    # Test HTTP endpoint
    - name: Test Immich web interface
      uri:
        url: "http://localhost:2283"
        method: GET
        status_code: [200, 302, 301]
        timeout: 10
      register: immich_http_result
      until: immich_http_result.status in [200, 301, 302]
      retries: 12
      delay: 10
      when: not ansible_check_mode

    - name: Assert Immich web interface is accessible
      assert:
        that:
          - immich_http_result.status in [200, 301, 302]
        fail_msg: "❌ Immich web interface not accessible"
        success_msg: "✅ Immich web interface is accessible (HTTP {{ immich_http_result.status }})"
      when: not ansible_check_mode

    # Check database connectivity (via immich-server container)
    - name: Test database connectivity
      command: >
        docker compose exec -T immich-server 
        sh -c 'pg_isready -h immich_postgres -U {{ immich_db_username }}'
      args:
        chdir: "{{ immich_app_dir }}"
      become_user: "{{ immich_host_user }}"
      register: db_check
      changed_when: false
      failed_when: false
      when: not ansible_check_mode

    - name: Assert database is accessible
      assert:
        that:
          - db_check.rc == 0
          - "'accepting connections' in db_check.stdout"
        fail_msg: "❌ PostgreSQL database is not accessible"
        success_msg: "✅ PostgreSQL database is accepting connections"
      when: not ansible_check_mode

    # Display deployment summary
    - name: Get Tailscale IPv4
      command: tailscale ip -4
      register: tailscale_ipv4
      changed_when: false
      failed_when: false

    - name: Display deployment summary
      debug:
        msg:
          - "========================================="
          - "✅ Immich Deployment Successful"
          - "========================================="
          - "Containers: {{ running_count.stdout }} running"
          - "Local URL: http://{{ ansible_host }}:2283"
          - "Tailscale IP: {{ tailscale_ipv4.stdout | default('Not installed') }}"
          - "Tailscale URL: https://immich.wyrm-wall.ts.net"
          - "Web Server Port (2283): {{ 'Listening' if immich_port_result is success else 'Not ready' }}"
          - "HTTP Status: {{ immich_http_result.status }}"
          - "Database: {{ 'Connected' if db_check.rc == 0 else 'Not connected' }}"
          - "Upload Directory: {{ immich_upload_dir }}"
          - "Database Directory: {{ immich_db_dir }}"
          - "========================================="
      when: not ansible_check_mode

