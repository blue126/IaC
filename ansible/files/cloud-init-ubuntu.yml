#cloud-config
ssh_pwauth: true
preserve_hostname: false
manage_etc_hosts: true
hostname: netbox
users:
  - default
  - name: ubuntu
    sudo: ALL=(ALL) NOPASSWD:ALL
    groups: sudo
    lock_passwd: false
    ssh_authorized_keys:
      - ssh-rsa  root@pve0
      - ssh-rsa  root@pve1
      - ssh-rsa  root@pve2
chpasswd:
  list: |
    ubuntu:ubuntu
  expire: false

