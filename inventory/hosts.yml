---
all:
  children:
    proxmox_cluster:
      hosts:
        pve0:
          ansible_host: 192.168.1.20  # First Proxmox node
          ansible_user: root
          ansible_ssh_pass: "Admin123..."  # Direct password for homelab
        pve1:
          ansible_host: 192.168.1.21  # Second Proxmox node
          ansible_user: root
          ansible_ssh_pass: "Admin123..."  # Direct password for homelab
        pve2:
          ansible_host: 192.168.1.22  # Third Proxmox node
          ansible_user: root
          ansible_ssh_pass: "Admin123..."  # Direct password for homelab
      vars:
        # Proxmox API settings
        proxmox_api_host: "{{ ansible_host }}"
        proxmox_api_port: 8006
        proxmox_api_user: root@pam
        # proxmox_api_password: "your-password"  # Recommend using vault encryption
        # proxmox_api_token_id: "your-token-id"  # Or use API token
        # proxmox_api_token_secret: "your-token-secret"
    
    application_vms:
      children:
        immich:
        samba: